server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html|css|js|png|jpg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
